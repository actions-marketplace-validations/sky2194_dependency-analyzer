name: Production Smoke Tests

on:
  push:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Run API tests against production
        env:
          BASE_URL: https://www.depanalyzer.com
        run: |
          pytest tests/backend/test_api.py -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: .pytest_cache/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (production)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run production smoke tests
        working-directory: tests
        env:
          BASE_URL: https://www.depanalyzer.com
          CI: true
        run: npx playwright test tests/production_smoke.spec.ts --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
