<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>DepAnalyzer — Dependency Vulnerability Scanner</title>
    <meta name="description" content="Scan your npm, PyPI, or Maven dependencies for CVEs in seconds. DepAnalyzer maps your full dependency tree — direct and transitive — and tells you exactly how to fix each vulnerability." />
    <meta name="keywords" content="dependency scanner, SCA, software composition analysis, CVE scanner, npm vulnerabilities, PyPI security, open source security, SBOM" />
    <meta name="author" content="DepAnalyzer" />
    <link rel="canonical" href="https://www.depanalyzer.com" />

    <!-- Open Graph (LinkedIn, Slack, Discord, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.depanalyzer.com" />
    <meta property="og:title" content="DepAnalyzer — Free Dependency Vulnerability Scanner" />
    <meta property="og:description" content="Scan npm, PyPI, and Maven dependencies for CVEs in seconds. See the full dependency tree, trace every vulnerability to its source, and get exact fix commands." />
    <meta property="og:image" content="https://www.depanalyzer.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="DepAnalyzer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.depanalyzer.com" />
    <meta name="twitter:title" content="DepAnalyzer — Free Dependency Vulnerability Scanner" />
    <meta name="twitter:description" content="Scan npm, PyPI, and Maven dependencies for CVEs in seconds. Full dependency tree, CVE paths, fix commands. Free and open source." />
    <meta name="twitter:image" content="https://www.depanalyzer.com/og-image.png" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- Twitter missing tags -->
    <meta name="twitter:site" content="@depanalyzer" />
    <meta name="twitter:image:alt" content="DepAnalyzer — scan showing CVE vulnerabilities in dependency tree" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/og-image.png" sizes="32x32" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DepAnalyzer",
      "description": "Free open source dependency vulnerability scanner. Scans npm, PyPI, and Maven dependencies for CVEs using OSV and NVD data.",
      "url": "https://www.depanalyzer.com",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Dependency vulnerability scanning",
        "CVE detection via OSV and NVD",
        "Transitive dependency analysis",
        "npm, PyPI, Maven support",
        "Risk scoring",
        "Fix recommendations"
      ],
      "license": "https://github.com/sky2194/dependency-analyzer/blob/main/LICENSE",
      "codeRepository": "https://github.com/sky2194/dependency-analyzer"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DepAnalyzer",
      "url": "https://www.depanalyzer.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.depanalyzer.com/scan",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
