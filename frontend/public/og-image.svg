<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#4f8ef7"/>

  <!-- Top status bar -->
  <rect x="0" y="0" width="1200" height="36" fill="#161b22"/>
  <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="52" cy="18" r="5" fill="#28c840"/>
  <text x="80" y="23" fill="#8b949e" font-size="11" font-family="monospace">depanalyzer.com — Dependency Vulnerability Scanner</text>
  <text x="1120" y="23" fill="#4f8ef7" font-size="11" font-family="monospace">v2.4.1</text>

  <!-- Shield icon -->
  <g transform="translate(64, 90)">
    <path d="M28 0L0 10v18c0 14 12 26 28 32 16-6 28-18 28-32V10L28 0z" fill="none" stroke="#4f8ef7" stroke-width="2.5"/>
    <path d="M16 28l8 8 16-16" fill="none" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main headline -->
  <text x="130" y="118" fill="#e6edf3" font-size="52" font-weight="bold" font-family="monospace" letter-spacing="-1">DepAnalyzer</text>

  <!-- Tagline -->
  <text x="64" y="160" fill="#8b949e" font-size="22" font-family="monospace">Find CVEs hiding in your dependencies.</text>

  <!-- Divider -->
  <line x1="64" y1="185" x2="600" y2="185" stroke="#21262d" stroke-width="1"/>

  <!-- Stats row -->
  <text x="64" y="220" fill="#4f8ef7" font-size="28" font-weight="bold" font-family="monospace">249k+</text>
  <text x="64" y="242" fill="#8b949e" font-size="12" font-family="monospace">CVEs indexed</text>

  <line x1="200" y1="205" x2="200" y2="248" stroke="#21262d" stroke-width="1"/>

  <text x="220" y="220" fill="#4f8ef7" font-size="28" font-weight="bold" font-family="monospace">3</text>
  <text x="220" y="242" fill="#8b949e" font-size="12" font-family="monospace">Ecosystems</text>

  <line x1="330" y1="205" x2="330" y2="248" stroke="#21262d" stroke-width="1"/>

  <text x="350" y="220" fill="#4f8ef7" font-size="28" font-weight="bold" font-family="monospace">Free</text>
  <text x="350" y="242" fill="#8b949e" font-size="12" font-family="monospace">No signup</text>

  <line x1="460" y1="205" x2="460" y2="248" stroke="#21262d" stroke-width="1"/>

  <text x="480" y="220" fill="#4f8ef7" font-size="28" font-weight="bold" font-family="monospace">OSS</text>
  <text x="480" y="242" fill="#8b949e" font-size="12" font-family="monospace">Open source</text>

  <!-- Mock terminal panel -->
  <rect x="640" y="50" width="520" height="530" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="640" y="50" width="520" height="32" rx="6" fill="#21262d"/>
  <rect x="640" y="68" width="520" height="14" fill="#21262d"/>
  <text x="660" y="71" fill="#8b949e" font-size="11" font-family="monospace">$ depanalyzer scan package.json</text>

  <!-- CVE rows -->
  <text x="660" y="112" fill="#3fb950" font-size="11" font-family="monospace">✓ Resolved 53 packages (10 direct, 43 transitive)</text>
  <text x="660" y="130" fill="#3fb950" font-size="11" font-family="monospace">✓ Queried OSV · NVD fallback · EPSS loaded</text>
  <text x="660" y="148" fill="#3fb950" font-size="11" font-family="monospace">✓ Risk scored</text>

  <line x1="660" y1="162" x2="1140" y2="162" stroke="#21262d" stroke-width="1"/>

  <!-- CRITICAL rows -->
  <rect x="656" y="172" width="484" height="22" rx="2" fill="#2d1b1b"/>
  <text x="664" y="187" fill="#f85149" font-size="11" font-weight="bold" font-family="monospace">CRITICAL</text>
  <text x="748" y="187" fill="#e6edf3" font-size="11" font-family="monospace">lodash@4.17.15 · CVE-2020-28500 · CVSS 9.8</text>

  <rect x="656" y="198" width="484" height="22" rx="2" fill="#2d1b1b"/>
  <text x="664" y="213" fill="#f85149" font-size="11" font-weight="bold" font-family="monospace">CRITICAL</text>
  <text x="748" y="213" fill="#e6edf3" font-size="11" font-family="monospace">ejs@3.1.5 · CVE-2022-29078 · CVSS 9.8</text>

  <rect x="656" y="224" width="484" height="22" rx="2" fill="#2d1e10"/>
  <text x="664" y="239" fill="#e3b341" font-size="11" font-weight="bold" font-family="monospace">HIGH    </text>
  <text x="748" y="239" fill="#e6edf3" font-size="11" font-family="monospace">axios@0.21.1 · CVE-2021-3749 · CVSS 7.5</text>

  <!-- Path line -->
  <text x="664" y="266" fill="#8b949e" font-size="10" font-family="monospace">Path: express → body-parser → lodash</text>

  <!-- Fix line -->
  <rect x="656" y="274" width="484" height="24" rx="2" fill="#0d2818"/>
  <text x="664" y="290" fill="#3fb950" font-size="11" font-family="monospace">Fix: npm install lodash@4.17.21</text>

  <!-- Risk score -->
  <rect x="656" y="310" width="484" height="2" fill="#21262d"/>
  <text x="664" y="332" fill="#8b949e" font-size="11" font-family="monospace">Risk Score</text>
  <text x="800" y="332" fill="#f85149" font-size="24" font-weight="bold" font-family="monospace">72</text>
  <text x="834" y="332" fill="#8b949e" font-size="11" font-family="monospace">/100 HIGH</text>

  <!-- Progress bar -->
  <rect x="656" y="340" width="484" height="6" rx="3" fill="#21262d"/>
  <rect x="656" y="340" width="348" height="6" rx="3" fill="#f85149"/>

  <!-- Ecosystem badges -->
  <rect x="656" y="530" width="484" height="32" rx="4" fill="#0d1117"/>
  <text x="668" y="550" fill="#4f8ef7" font-size="11" font-family="monospace">npm</text>
  <text x="714" y="550" fill="#8b949e" font-size="11" font-family="monospace">·</text>
  <text x="728" y="550" fill="#4f8ef7" font-size="11" font-family="monospace">PyPI</text>
  <text x="778" y="550" fill="#8b949e" font-size="11" font-family="monospace">·</text>
  <text x="792" y="550" fill="#4f8ef7" font-size="11" font-family="monospace">Maven</text>
  <text x="860" y="550" fill="#8b949e" font-size="11" font-family="monospace">·</text>
  <text x="874" y="550" fill="#3fb950" font-size="11" font-family="monospace">Free · No signup · Open source</text>

  <!-- Bottom domain -->
  <text x="64" y="580" fill="#4f8ef7" font-size="16" font-family="monospace" font-weight="bold">depanalyzer.com</text>
</svg>